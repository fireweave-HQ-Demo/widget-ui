name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    environment: production

    permissions:
      contents: read
      deployments: write

    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}
      VITE_FLAG_KEY: widget-demo-feature

    steps:
      - name: Create GitHub deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Deploy over SSH
        id: ssh_deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ env.DEPLOY_BRANCH }}
          VITE_POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
          VITE_FLAG_KEY: ${{ env.VITE_FLAG_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: DEPLOY_PATH,DEPLOY_BRANCH,VITE_FLAG_KEY,VITE_POSTHOG_API_KEY,VITE_POSTHOG_HOST
          script: |
            set -euo pipefail
            export PATH="/root/.bun/bin:/usr/local/bin:$PATH"
            DEPLOY_PATH="${DEPLOY_PATH:-/root/test/widget-ui}"
            DEPLOY_BRANCH="${DEPLOY_BRANCH:-main}"
            echo "[deploy] path=$DEPLOY_PATH branch=$DEPLOY_BRANCH"
            cd "$DEPLOY_PATH"
            git fetch origin
            git checkout "$DEPLOY_BRANCH"
            git pull origin "$DEPLOY_BRANCH"
            {
              echo "VITE_FLAG_KEY=${VITE_FLAG_KEY:-widget-demo-feature}"
              echo "VITE_POSTHOG_API_KEY=${VITE_POSTHOG_API_KEY:-}"
              echo "VITE_POSTHOG_HOST=${VITE_POSTHOG_HOST:-https://us.i.posthog.com}"
            } > .env.build
            set -a && source .env.build && set +a
            bun install
            bun run build
            rm -f .env.build
            command -v pm2 >/dev/null || npm install -g pm2
            pm2 startOrRestart deploy/ecosystem.config.cjs --update-env
            pm2 save
            sleep 3
            curl -sf "http://127.0.0.1:3102" -o /dev/null
            echo "[deploy] widget-ui healthy (pm2)"

      - name: Mark deployment success
        if: steps.ssh_deploy.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number('${{ steps.deployment.outputs.deployment_id }}'),
              state: 'success',
              environment: 'production',
              description: 'Deployed to ${{ secrets.SSH_HOST }}',
            });

      - name: Mark deployment failure
        if: steps.ssh_deploy.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number('${{ steps.deployment.outputs.deployment_id }}'),
              state: 'failure',
              environment: 'production',
              description: 'SSH deploy failed',
            });
            core.setFailed('SSH deploy failed');
